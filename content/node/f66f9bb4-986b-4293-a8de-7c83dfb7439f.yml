      langcode: fr
  body:
    -
      value: '<p>Le Gouvernement poursuit la modernisation des services publics numériques afin de faciliter les démarches administratives des citoyens.</p><p>De nouveaux parcours simplifiés sont progressivement déployés pour réduire les délais de traitement et améliorer l’accessibilité des plateformes en ligne sur l’ensemble du territoire.</p><hr /><p><b>Simplification des parcours utilisateur</b> : Les démarches administratives sont réorganisées autour des besoins de l’usager plutôt que de la structure administrative. Les formulaires sont réduits à l’essentiel et les données pré-remplies quand possible.</p><p>Une seule connexion suffit pour accéder à l’ensemble des services publics en ligne via France Connect. L’authentification sécurisée unifie l’accès sans multiplier les identifiants pour chaque service.</p><hr /><p><b>Réduction des délais de traitement</b> : L’automatisation des traitements administratifs simples permet une réponse immédiate à l’usager. Les cas complexes sont traités en priorité par les agents dédiés.</p><p>Le suivi en temps réel de la demande est accessible par l’usager. Les notifications informent à chaque étape de l’avancement du dossier, éliminant l’incertitude et l’inquiétude.</p><p><b>Accessibilité pour tous</b> : Les plateformes respectent scrupuleusement les normes d’accessibilité WCAG pour les personnes en situation de handicap. Une assistance utilisateur personnalisée complète les moyens techniques.</p>'
