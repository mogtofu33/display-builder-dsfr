  body:
    -
      value: '<p>Toutes les données des sites en .gouv.fr en un coup d’œil</p><p>Visualisez les données d’audience des sites publics et l’ensemble des noms de domaine en .gouv.fr, l’extension réservée aux sites Internet de l’État.</p><hr /><p><b>Transparence des données publiques</b> : La publication régulière de ces statistiques témoigne de l’engagement du gouvernement en faveur de la transparence et de la responsabilité. Les données sont collectées, traitées et mises à disposition de manière impartiale et fiable.</p><p>Les citoyens, les chercheurs et les analystes peuvent accéder librement à ces informations pour comprendre l’audience et l’impact des sites gouvernementaux. Cette transparence renforce la confiance envers les institutions.</p><hr /><p><b>Analyse des tendances</b> : Les données permettent d’identifier les tendances d’utilisation des services en ligne de l’État. Les pics de fréquentation et les variations saisonnières sont clairement visibles et analysables.</p><p>Ces informations aident les administrations à optimiser leurs investissements numériques et à améliorer l’expérience utilisateur. Des comparaisons entre sites favorisent les bonnes pratiques et l’amélioration continue.</p><p><b>Accessibilité des données</b> : Un tableau de bord interactif permet de filtrer et explorer les données selon différents critères : ministère, type de service, domaine d’activité. Les téléchargements en formats ouverts facilitent l’utilisation des données.</p>'
