  body:
    -
      value: '<p>Plusieurs projets de modernisation des infrastructures de transport public sont engagés afin d’améliorer la qualité de service pour les usagers.</p><p>Les travaux concernent le renouvellement des équipements, l’accessibilité des stations et le développement des mobilités durables.</p><hr /><p><b>Renouvellement du parc roulant</b> : Les autobus et tramways vieillissants sont progressivement remplacés par des véhicules modernes et écologiques. Ces nouveaux équipements offrent plus de confort, de fiabilité et une consommation énergétique réduite.</p><p>Les investissements portent notamment sur l’électrification des flottes et l’amélioration de l’accessibilité intérieure des véhicules. Une meilleure climatisation et un système d’information en temps réel améliorent l’expérience des passagers.</p><hr /><p><b>Amélioration de l’accessibilité</b> : Toutes les stations et arrêts doivent être accessibles aux personnes à mobilité réduite. Des rampes d’accès, des ascenseurs et des éclairages améliorés sont installés progressivement.</p><p>Les traversées piétonnes et les abris sont aménagés pour offrir un confort accru. Une signalétique claire et une information en plusieurs formats facilitent la navigation dans le réseau.</p><p><b>Vers une mobilité durable</b> : Le développement des transports en commun s’accompagne d’une réduction des émissions de gaz à effet de serre. Les objectifs environnementaux et sociaux sont au cœur de cette modernisation.</p>'
