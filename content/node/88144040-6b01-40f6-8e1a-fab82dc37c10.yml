  body:
    -
      value: '<p>De nouveaux espaces France Services ouvrent progressivement afin de renforcer la proximité des services publics et d’accompagner les usagers dans leurs démarches administratives et numériques du quotidien.</p><hr /><p><b>Un guichet unique pour les citoyens</b> : Les espaces France Services offrent un accès simplifié aux services publics locaux. Citizens can accomplish most of their administrative tasks at a single location without traveling to multiple offices.</p><p>Des conseillers numériques sont présents pour accompagner les usagers dans l’utilisation des plateformes en ligne. Ils assistent notamment les personnes éloignées du numérique pour accéder aux services essentiels.</p><hr /><p><b>Services proposés</b> : L’offre de services inclut les démarches sociales, fiscales, de logement, d’emploi et bien d’autres. Les formulaires administratifs sont pré-remplis quand c’est possible pour simplifier les procédures.</p><p>Des partenaires publics et privés collaborent pour élargir continuellement l’offre de services disponibles. Les horaires d’ouverture sont pensés pour la commodité des usagers, avec des créneaux en fin de journée et le samedi.</p><p><b>Aide numérique personnalisée</b> : Au-delà de l’accompagnement administrative, les équipes des espaces France Services proposent des formations aux outils numériques. Des ateliers collectifs permettent d’acquérir les compétences essentielles pour naviguer en ligne.</p>'
