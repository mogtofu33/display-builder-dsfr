  body:
    -
      value: '<p>Un nouveau programme d’accompagnement est mis en place pour soutenir les collectivités territoriales dans leurs projets de transition écologique et de modernisation des infrastructures publiques. Les dispositifs incluent un appui technique, des formations et des financements dédiés.</p><hr /><p><b>Objectifs du programme</b> : Ce programme ambitieux vise à renforcer la capacité des collectivités locales à mettre en œuvre des projets durables et innovants sur leur territoire. Il fournit un soutien multifacette pour accompagner les élus et les équipes techniques.</p><p>Les ressources mises à disposition incluent des consultants spécialisés, des ateliers de formation réguliers et des lignes de financement adaptées à différents types de projets. Les collectivités peuvent ainsi accélérer leur transformation.</p><hr /><p><b>Domaines d’intervention</b> : Le programme couvre plusieurs domaines clés incluant la transition écologique, l’amélioration des services publics, l’efficacité énergétique et la mobilité durable. Chaque collectivité peut adapter ces domaines à ses priorités locales.</p><p>Des exemples concrets de projets réussis sont partagés régulièrement pour inspirer les nouvelles initiatives. Le réseau de partage d’expérience entre collectivités favorise l’innovation et l’apprentissage mutuel.</p><p><b>Comment participer</b> : Les collectivités intéressées peuvent candidater via un processus simplifié d’appel à manifestation d’intérêt. L’équipe d’accompagnement évalue les projets et propose un suivi personnalisé pour chaque lauréat.</p>'
