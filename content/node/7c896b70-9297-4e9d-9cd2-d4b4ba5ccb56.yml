  body:
    -
      value: '<p>[...]</p><p>Bienvenue !</p><p>Ce site utilise des cookies pour mesurer la fréquentation du site afin d’en améliorer le fonctionnement et l’administration et, avec votre accord, pour évaluer la performance des campagnes d’informations et améliorer votre expérience utilisateur, ainsi que pour vous proposer des services interactifs fournis par nos partenaires.</p><p>Nous conservons votre choix pendant 6 mois.</p><p>Vous pouvez changer ce choix à tout moment en vous rendant sur la page Données personnelles et cookies.</p><hr /><p><b>Qu’est-ce qu’un cookie ?</b> : Un cookie est un petit fichier texte stocké sur l’appareil de l’utilisateur. Il contient des informations que le serveur peut lire pour reconnaître l’usager et améliorer son expérience.</p><p>Les cookies permettent de mémoriser les préférences de l’utilisateur, d’améliorer les services proposés et de sécuriser les transactions en ligne. Sans cookies, de nombreux services seraient beaucoup plus difficiles à utiliser.</p><hr /><p><b>Votre contrôle sur les cookies</b> : Vous avez la possibilité d’accepter ou de refuser les cookies via la bannière de consentement. Votre choix est respecté et mémorisé pour les 6 prochains mois.</p><p>Pour modifier vos préférences, un lien de gestion des cookies reste disponible en bas de page. Les cookies essentiels au fonctionnement du site ne peuvent pas être désactivés, tandis que les cookies de suivi sont optionnels.</p><p><b>Transparence et conformité</b> : Ce site est conforme au Règlement Général sur la Protection des Données (RGPD) et aux réglementations françaises. Tous les cookies utilisés sont documentés dans notre déclaration complète.</p>'
      format: full_html_dsfr
      summary: ''
