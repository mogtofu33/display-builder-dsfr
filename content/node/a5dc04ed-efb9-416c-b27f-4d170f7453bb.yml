  body:
    -
      value: '<p>L’État renforce les dispositifs d’inclusion numérique pour permettre à tous les usagers d’accéder plus facilement aux services publics en ligne.</p><p>Des espaces d’accompagnement sont déployés dans plusieurs territoires afin d’aider les citoyens dans leurs démarches numériques.</p><hr /><p><b>Lutter contre l’exclusion numérique</b> : Environ 13 millions de Français sont en situation de fragilité numérique. Cette réalité justifie le déploiement massif d’accompagnement et de formation au numérique.</p><p>Les populations fragiles incluent les seniors, les personnes peu instruites, les chômeurs et les personnes handicapées. Des solutions adaptées et respectueuses de la dignité de chacun sont mises en place.</p><hr /><p><b>Formation et accompagnement</b> : Les conseillers numériques proposent une aide gratuite et sans condition. Ils enseignent les compétences essentielles pour naviguer en ligne et accéder aux services administratifs.</p><p>Des formations ciblées sont développées pour chaque groupe de population. Les seniors bénéficient de cours spécialisés adaptés à leurs besoins et à leur rythme d’apprentissage.</p><p><b>Accès aux équipements</b> : Des ordinateurs publics mis à disposition gratuitement permettent à tous d’accéder à internet. Les connexions haut débit sont élargies pour couvrir les zones géographiquement isolées.</p>'
