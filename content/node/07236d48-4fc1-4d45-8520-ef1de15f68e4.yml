      langcode: fr
  body:
    -
      value: '<p>Le Gouvernement poursuit son engagement en faveur de l’apprentissage et de la formation professionnelle afin de faciliter l’accès à l’emploi et le développement des compétences.</p><p>Des dispositifs renforcés accompagnent les jeunes, les salariés et les demandeurs d’emploi dans leurs parcours professionnels.</p><hr /><p><b>Soutien aux jeunes</b> : Un ensemble de mesures nouvelles favorise l’accès des jeunes à la qualification professionnelle. Ces initiatives combinent formation théorique et pratique en entreprise pour assurer une meilleure insertion professionnelle.</p><p>Les contrats d’apprentissage sont simplifiés et bénéficient d’aides financières accréditées. Les centres de formation travaillent en étroite collaboration avec les employeurs pour anticiper les besoins du marché du travail.</p><hr /><p><b>Formation continue pour les salariés</b> : Les dispositifs de formation continue permettent aux salariés de développer de nouvelles compétences tout au long de leur carrière. Le droit individuel à la formation est renforcé et mieux accessible à tous.</p><p>Les congés de formation et les bilans de compétences facilitent la reconversion professionnelle quand elle est nécessaire. Des partenariats publics-privés garantissent une offre de formation de qualité adaptée aux évolutions économiques.</p><p><b>Accompagnement des demandeurs d’emploi</b> : Un suivi personnalisé est proposé à chaque demandeur d’emploi pour construire un projet professionnel viable. Les formations qualifiantes sont ciblées sur les secteurs porteurs et les métiers en tension.</p>'
